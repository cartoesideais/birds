<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Multi-Sky Party</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FFD93D; --secondary: #FF6B6B; --accent: #4ECDC4; --dark: #2C3E50; }
        body { margin: 0; overflow: hidden; background: #333; font-family: 'Fredoka', sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        .panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 85%; max-width: 380px; z-index: 100; }
        .hidden { display: none !important; }
        h1 { color: var(--secondary); margin: 0 0 15px 0; font-size: 1.8rem; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; margin: 8px 0; width: 100%; font-weight: 600; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        #score { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 3rem; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10; }
        #lobby-chat-box { height: 100px; overflow-y: auto; background: #eee; margin: 10px 0; padding: 10px; border-radius: 10px; text-align: left; font-size: 0.9rem; }
        .player-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score">0</div>
    <canvas id="world"></canvas>

    <div id="menu-panel" class="panel">
        <h1>Multi-Sky Party</h1>
        <input type="text" id="player-name" placeholder="Seu Nome" maxlength="12">
        <button onclick="GameUI.showHostConfig()" style="background: var(--secondary)">Criar Sala</button>
        <button onclick="GameUI.showRooms()">Salas Online</button>
        <button onclick="GameUI.showGlobalRankings()" style="background: var(--dark)">Rankings Globais</button>
    </div>

    <div id="host-config-panel" class="panel hidden">
        <h1>Configurar Partida</h1>
        <label>Velocidade:</label>
        <input type="number" id="cfg-speed" value="3" step="0.5">
        <div style="display:flex; gap:5px; margin:10px 0; justify-content:center;">
            <input type="color" id="col-0" value="#FFD93D">
            <input type="color" id="col-1" value="#FF6B6B">
            <input type="color" id="col-2" value="#4ECDC4">
        </div>
        <button onclick="GameApp.hostGame()">Abrir Sala</button>
        <button onclick="location.reload()" style="background:#aaa">Voltar</button>
    </div>

    <div id="rooms-panel" class="panel hidden">
        <h1>Salas Disponíveis</h1>
        <div id="rooms-list-container" style="max-height: 200px; overflow-y: auto;"></div>
        <button onclick="location.reload()">Sair</button>
    </div>

    <div id="lobby-panel" class="panel hidden">
        <h1>Sala: <span id="display-room-code">----</span></h1>
        <div id="lobby-player-list"></div>
        <div id="lobby-chat-box"></div>
        <input type="text" id="chat-input" placeholder="Diga algo...">
        <button id="start-btn" class="hidden" onclick="GameApp.requestStart()" style="background: var(--secondary)">INICIAR AGORA</button>
    </div>

    <div id="ranking-panel" class="panel hidden">
        <h1>Fim de Jogo!</h1>
        <div id="ranking-results" style="margin-bottom: 15px;"></div>
        <button onclick="GameApp.rematch()" style="background: var(--secondary)">Jogar de Novo</button>
        <button onclick="location.reload()">Sair</button>
    </div>
</div>

<script>
/* ==========================================
   FIREBASE CONFIG (SUAS CHAVES)
   ========================================== */
const firebaseConfig = {
  apiKey: "AIzaSyB2OmU8VSXLnKV254zUJj1F3jkF2oSIKSA",
  authDomain: "flappymultiplayer-2d2e8.firebaseapp.com",
  databaseURL: "https://flappymultiplayer-2d2e8-default-rtdb.firebaseio.com",
  projectId: "flappymultiplayer-2d2e8",
  storageBucket: "flappymultiplayer-2d2e8.firebasestorage.app",
  messagingSenderId: "738226110512",
  appId: "1:738226110512:web:630ec1efe6073d450c2df5",
  measurementId: "G-0Q1CNX0K9D"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ==========================================
   MOTOR DO JOGO
   ========================================== */
const CONFIG = { gravity: 0.22, jump: -5.5, pipeWidth: 60, pipeGap: 165 };

class Bird {
    constructor(id, name, color) {
        this.id = id; this.name = name; this.color = color;
        this.x = 50; this.y = 250; this.v = 0; this.dead = false; this.score = 0;
    }
    update() {
        if (this.dead) return;
        this.v += CONFIG.gravity;
        this.y += this.v;
    }
    draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, 15, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
        ctx.fillText(this.name, this.x, this.y - 22);
    }
}

const GameEngine = {
    canvas: document.getElementById('world'),
    ctx: document.getElementById('world').getContext('2d'),
    birds: new Map(), pipes: [], score: 0, state: 'MENU', speed: 3,
    
    init() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        this.loop();
    },
    reset(speed) {
        this.pipes = []; this.score = 0; this.speed = speed || 3;
        this.birds.forEach(b => { b.y = 250; b.v = 0; b.dead = false; b.score = 0; });
        this.state = 'PLAYING';
    },
    update() {
        if (this.state !== 'PLAYING') return;
        this.birds.forEach(b => b.update());
        
        if (GameApp.isHost) {
            this.pipes.forEach(p => {
                p.x -= this.speed;
                this.birds.forEach(b => {
                    if(!b.dead && (b.y < p.gapY || b.y > p.gapY + CONFIG.pipeGap) && b.x > p.x && b.x < p.x + CONFIG.pipeWidth) {
                        b.dead = true;
                        GameApp.broadcast({ type: 'DIE', id: b.id, score: this.score });
                    }
                });
            });
            if (this.pipes.length === 0 || this.pipes[this.pipes.length-1].x < this.canvas.width - 280) {
                const p = { x: this.canvas.width, gapY: Math.random() * (this.canvas.height - 350) + 50 };
                this.pipes.push(p);
                GameApp.broadcast({ type: 'PIPE', p });
            }
        } else {
            this.pipes.forEach(p => p.x -= this.speed);
        }
    },
    draw() {
        this.ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
        this.ctx.fillStyle = "#2ecc71";
        this.pipes.forEach(p => {
            this.ctx.fillRect(p.x, 0, CONFIG.pipeWidth, p.gapY);
            this.ctx.fillRect(p.x, p.gapY + CONFIG.pipeGap, CONFIG.pipeWidth, this.canvas.height);
        });
        this.birds.forEach(b => b.draw(this.ctx));
        document.getElementById('score').innerText = this.score;
    },
    loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
};

const GameApp = {
    isHost: false, myId: null, myName: '', connections: [], players: [],
    
    hostGame() {
        this.myName = document.getElementById('player-name').value || 'Mestre';
        this.isHost = true;
        const code = Math.random().toString(36).substring(2,6).toUpperCase();
        this.peer = new Peer(code);
        
        this.peer.on('open', id => {
            this.myId = 'host';
            document.getElementById('display-room-code').innerText = id;
            db.ref('rooms/' + id).set({ host: this.myName, active: true });
            this.players = [{ id: 'host', name: this.myName, color: document.getElementById('col-0').value }];
            GameUI.setupLobby();
        });

        this.peer.on('connection', conn => {
            conn.on('data', data => this.handleData(data, conn));
            this.connections.push(conn);
        });
    },

    joinGame(code) {
        this.myName = document.getElementById('player-name').value || 'Player';
        this.peer = new Peer();
        this.peer.on('open', id => {
            this.myId = id;
            const conn = this.peer.connect(code);
            conn.on('open', () => {
                conn.send({ type: 'JOIN', name: this.myName });
                this.hostConn = conn;
                GameUI.setupLobby();
                document.getElementById('display-room-code').innerText = code;
            });
            conn.on('data', data => this.handleData(data));
        });
    },

    handleData(data, conn) {
        if (data.type === 'JOIN') {
            const p = { id: conn.peer, name: data.name, color: document.getElementById('col-1').value, conn: conn };
            this.players.push(p);
            this.broadcast({ type: 'LOBBY', players: this.players.map(x => ({id:x.id, name:x.name, color:x.color})) });
            GameUI.updateLobbyList();
        }
        if (data.type === 'LOBBY') { this.players = data.players; GameUI.updateLobbyList(); }
        if (data.type === 'START') { 
            this.players.forEach(p => GameEngine.birds.set(p.id, new Bird(p.id, p.name, p.color)));
            GameEngine.reset(data.speed);
            document.getElementById('lobby-panel').classList.add('hidden');
        }
        if (data.type === 'PIPE') GameEngine.pipes.push(data.p);
        if (data.type === 'DIE') { 
            const b = GameEngine.birds.get(data.id); 
            if(b) b.dead = true; 
            if(data.id === this.myId) {
                db.ref('rankings').push({ name: this.myName, score: data.score, date: firebase.database.ServerValue.TIMESTAMP });
                document.getElementById('ranking-panel').classList.remove('hidden');
                document.getElementById('ranking-results').innerText = `Você fez ${data.score} pontos!`;
            }
        }
        if (data.type === 'JUMP') { const b = GameEngine.birds.get(data.id); if(b) b.v = CONFIG.jump; }
    },

    broadcast(data) { this.connections.forEach(c => c.open && c.send(data)); },
    
    requestStart() {
        const speed = parseFloat(document.getElementById('cfg-speed').value);
        const startData = { type: 'START', speed: speed };
        this.broadcast(startData);
        this.handleData(startData);
        db.ref('rooms/' + this.peer.id).remove(); 
    },

    jump() {
        if (GameEngine.state !== 'PLAYING') return;
        const myBird = GameEngine.birds.get(this.myId);
        if (myBird && !myBird.dead) {
            myBird.v = CONFIG.jump;
            if (this.isHost) this.broadcast({ type: 'JUMP', id: this.myId });
            else this.hostConn.send({ type: 'JUMP', id: this.myId });
        }
    }
};

const GameUI = {
    showHostConfig() { 
        if(!document.getElementById('player-name').value) return alert("Digite seu nome!");
        document.getElementById('menu-panel').classList.add('hidden'); 
        document.getElementById('host-config-panel').classList.remove('hidden'); 
    },
    setupLobby() {
        document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
        document.getElementById('lobby-panel').classList.remove('hidden');
    },
    updateLobbyList() {
        const list = document.getElementById('lobby-player-list');
        list.innerHTML = GameApp.players.map(p => `<div class="player-item">${p.name} <span style="color:${p.color}">●</span></div>`).join('');
        if (GameApp.isHost) document.getElementById('start-btn').classList.remove('hidden');
    },
    showRooms() {
        document.getElementById('menu-panel').classList.add('hidden');
        document.getElementById('rooms-panel').classList.remove('hidden');
        const container = document.getElementById('rooms-list-container');
        container.innerHTML = "Buscando...";
        db.ref('rooms').once('value', snapshot => {
            const rooms = snapshot.val();
            container.innerHTML = "";
            if(!rooms) container.innerHTML = "Nenhuma sala aberta.";
            for (let id in rooms) {
                const btn = document.createElement('button');
                btn.innerText = `Entrar na sala de ${rooms[id].host}`;
                btn.onclick = () => GameApp.joinGame(id);
                container.appendChild(btn);
            }
        });
    },
    showGlobalRankings() {
        db.ref('rankings').orderByChild('score').limitToLast(10).once('value', snap => {
            let list = [];
            snap.forEach(c => { list.push(c.val()); });
            list.reverse();
            let msg = "TOP 10 MUNDIAL:\n\n";
            list.forEach((r, i) => msg += `${i+1}º ${r.name}: ${r.score} pts\n`);
            alert(msg);
        });
    }
};

window.addEventListener('mousedown', () => GameApp.jump());
window.addEventListener('touchstart', (e) => { e.preventDefault(); GameApp.jump(); }, {passive: false});
GameEngine.init();
</script>
</body>
</html>
