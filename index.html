<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Sky Party</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">

<style>
:root { --primary:#FFD93D; --secondary:#FF6B6B; --accent:#4ECDC4; }

body{margin:0;overflow:hidden;background:#222;font-family:'Fredoka',sans-serif;touch-action:none}

#game-container{position:relative;width:100vw;height:100vh;overflow:hidden;background:#4facfe}

canvas{display:block;width:100%;height:100%}

.ui-wrapper{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:100}

.ui-panel{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
text-align:center;
width:85%;
max-width:340px;
pointer-events:auto;
border:4px solid #fff;
display:flex;
flex-direction:column;
gap:10px
}

.hidden{display:none!important}

button{
background:var(--accent);
color:white;
border:none;
padding:15px;
border-radius:15px;
font-size:1.1rem;
cursor:pointer;
font-weight:700;
box-shadow:0 5px 0 #39a69e
}

button:active{
transform:translateY(3px);
box-shadow:0 2px 0 #39a69e
}

input{
width:100%;
padding:12px;
border:3px solid #eee;
border-radius:12px;
text-align:center;
box-sizing:border-box
}

#score-ui{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:4rem;
color:white;
font-weight:700;
text-shadow:3px 3px 0 rgba(0,0,0,0.2);
z-index:10;
pointer-events:none
}

#lobby-chat-box{
height:100px;
overflow-y:auto;
background:#f9f9f9;
border-radius:10px;
padding:8px;
font-size:0.8rem;
text-align:left;
border:1px solid #ddd
}
</style>

</head>

<body>

<div id="game-container">

<div id="score-ui">0</div>

<canvas id="world"></canvas>

<div class="ui-wrapper">

<div id="menu-panel" class="ui-panel">

<h1 style="color:var(--secondary);margin:0;">SKY PARTY</h1>

<input type="text" id="player-name" placeholder="Nome (A-Z,0-9)" maxlength="10">

<button onclick="UI.startHost()" style="background:var(--secondary)">CRIAR SALA</button>

<button onclick="UI.listRooms()">BUSCAR SALAS</button>

</div>

<div id="lobby-panel" class="ui-panel hidden">

<h2 id="room-id">SALA</h2>

<div id="player-list"></div>

<div id="lobby-chat-box"></div>

<div style="display:flex;gap:5px">
<input type="text" id="chat-input">
<button onclick="App.sendChat()">OK</button>
</div>

<button id="btn-start" onclick="App.startGame()" style="background:var(--secondary);display:none">
INICIAR
</button>

</div>

<div id="over-panel" class="ui-panel hidden">

<h1>FIM DE JOGO</h1>

<h2 id="final-score">0</h2>

<button onclick="location.reload()">SAIR</button>

</div>

</div>
</div>

<script>

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyB2OmU8VSXLnKV254zUJj1F3jkF2oSIKSA",
authDomain:"flappymultiplayer-2d2e8.firebaseapp.com",
databaseURL:"https://flappymultiplayer-2d2e8-default-rtdb.firebaseio.com",
projectId:"flappymultiplayer-2d2e8",
storageBucket:"flappymultiplayer-2d2e8.appspot.com",
messagingSenderId:"738226110512",
appId:"1:738226110512:web:630ec1efe6073d450c2df5"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

/* ROOMS API (substitui Netlify) */

const RoomsAPI={

async list(){

const snap=await db.ref("sky_rooms").once("value")

const rooms=[]

snap.forEach(r=>{
rooms.push({id:r.key,...r.val()})
})

return rooms
},

async create(id,hostName){

await db.ref("sky_rooms/"+id).set({
hostName,
createdAt:Date.now()
})

},

async delete(id){

await db.ref("sky_rooms/"+id).remove()

}

}


/* RANKINGS API (substitui Netlify) */

const RankingsAPI={

async submit(name,score){

const now=new Date()

const dailyKey=`daily_${now.toISOString().split("T")[0]}`

const d=new Date(Date.UTC(now.getFullYear(),now.getMonth(),now.getDate()))

const dayNum=d.getUTCDay()||7

d.setUTCDate(d.getUTCDate()+4-dayNum)

const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1))

const weekNo=Math.ceil((((d-yearStart)/86400000)+1)/7)

const weeklyKey=`weekly_${d.getUTCFullYear()}_${weekNo}`

const monthlyKey=`monthly_${now.getUTCFullYear()}_${now.getMonth()+1}`

await Promise.all([
this.update("overall",name,score),
this.update(monthlyKey,name,score),
this.update(weeklyKey,name,score),
this.update(dailyKey,name,score)
])

},

async update(key,name,score){

const ref=db.ref("rankings/"+key)

const snap=await ref.once("value")

let current=snap.val()||[]

const idx=current.findIndex(r=>r.name===name)

if(idx!==-1){

if(score>current[idx].score){

current[idx].score=score
current[idx].date=new Date().toISOString()

}

}else{

current.push({name,score,date:new Date().toISOString()})

}

current.sort((a,b)=>b.score-a.score)

current=current.slice(0,100)

await ref.set(current)

}

}

/* JOGO */

const Engine={
canvas:document.getElementById("world"),
ctx:document.getElementById("world").getContext("2d"),
birds:new Map(),
pipes:[],
state:"MENU",
speed:4
}

/* BIRD */

class Bird{

constructor(id,name,color){

this.id=id
this.name=name
this.color=color

this.x=100
this.y=300
this.v=0
this.dead=false

}

update(){

if(this.dead)return

this.v+=0.45
this.y+=this.v

if(this.y>window.innerHeight||this.y<0){
this.dead=true
App.die()
}

}

flap(){

this.v=-7.5

}

}

/* APP MULTIPLAYER */

const App={

isHost:false,
myId:"",
myName:"",
score:0,
players:[],
peers:[],

hostRoom(){

const code=Math.random().toString(36).substring(2,6).toUpperCase()

this.peer=new Peer(code)

this.peer.on("open",id=>{

this.myId="host"
this.isHost=true

RoomsAPI.create(id,this.myName)

this.players=[{id:"host",name:this.myName,color:"#FFD93D"}]

UI.show("lobby-panel")

document.getElementById("room-id").innerText="SALA: "+id

document.getElementById("btn-start").style.display="block"

})

},

joinRoom(id){

this.peer=new Peer()

this.peer.on("open",myId=>{

this.myId=myId

const conn=this.peer.connect(id)

this.hostConn=conn

conn.on("open",()=>{

conn.send({type:"JOIN",name:this.myName})

UI.show("lobby-panel")

document.getElementById("room-id").innerText="SALA: "+id

})

conn.on("data",d=>this.handleData(d))

})

},

startGame(){

if(!this.isHost)return

RoomsAPI.delete(this.peer.id)

}

}

/* UI */

const UI={

show(id){

document.querySelectorAll(".ui-panel").forEach(p=>p.classList.add("hidden"))

if(id)document.getElementById(id).classList.remove("hidden")

},

startHost(){

const n=document.getElementById("player-name").value

if(!/^[a-zA-Z0-9]+$/.test(n))return alert("Nome inválido")

App.myName=n

App.hostRoom()

},

async listRooms(){

const rooms=await RoomsAPI.list()

let html="<h3>Salas:</h3>"

rooms.forEach(r=>{
html+=`<button onclick="App.joinRoom('${r.id}')">SALA DE ${r.hostName}</button>`
})

html+=`<button onclick="location.reload()">VOLTAR</button>`

document.getElementById("menu-panel").innerHTML=html

}

}

</script>

</body>
</html>
